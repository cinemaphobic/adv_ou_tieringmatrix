<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADV OU Tiering History</title>
    <script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Core Styles */
        body { font-family: 'Courier New', Courier, monospace; background-color: #e5e7eb; }
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: #fff; border-left: 2px solid #000; }
        ::-webkit-scrollbar-thumb { background: #000; border: 2px solid #fff; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .retro-box { background-color: white; border: 2px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .retro-btn { border: 2px solid black; background-color: white; color: black; box-shadow: 2px 2px 0px 0px rgba(0,0,0,1); transition: all 0.1s; }
        .retro-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); }
        .retro-btn-primary { background-color: #2563eb; color: white; }
        
        .pixel-art { image-rendering: pixelated; }
        
        /* Loader Spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

		/* Matrix Styles */
		.matrix-cell { min-width: 60px; height: 40px; border: 1px solid #eee; text-align: center; font-size: 12px; cursor: default; }
        .matrix-cell:hover { border: 2px solid black; z-index: 10; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid black; }
        .sticky-row { position: sticky; top: 0; background: white; z-index: 30; border-bottom: 2px solid black; }
        .sticky-corner { position: sticky; top: 0; left: 0; z-index: 40; background: black; color: white; }
    </style>
</head>
<body class="h-full w-full overflow-hidden bg-[#e5e7eb] text-black flex flex-col p-4 md:p-6 box-border">

	<div class="flex-none max-w-[1600px] w-full mx-auto mb-4 flex justify-between items-center flex-wrap gap-4">
        <div>
            <h1 class="text-3xl font-black text-black tracking-tight uppercase">ADV OU Usage Database</h1>
            <p class="text-slate-600 text-sm font-bold">/// Historical Tracker & Hypothetical Tiering Matrix ///</p>
        </div>
    </div>
	
    <div id="view-tiering" class="flex-grow flex flex-col min-h-0 max-w-[1600px] w-full mx-auto overflow-hidden">
		<div class="flex-none retro-box p-4 mb-4 flex flex-col xl:flex-row gap-6 items-start xl:items-center justify-between bg-gray-50 border-2 border-black">
            
			<div class="max-w-2xl">
                <div class="flex items-center gap-3 mb-1">
                    <h2 class="text-lg font-black uppercase tracking-tight">Weighted Usage Matrix</h2>
                    <span id="tieringEloTag" class="text-lg font-mono font-bold text-blue-800 uppercase">[--]</span>
                </div>
                <p class="text-xs text-gray-500 font-bold leading-relaxed">Applying the classic 20/3/1 formula and 3.41% OU cutoff retroactively to Generation 3.</p>
            </div>

				<div class="flex flex-wrap items-center gap-4 bg-gray-200/50 p-2 px-3 border-2 border-gray-300">
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto shrink-0">
                        <span class="text-[10px] font-black uppercase text-gray-500 tracking-wider">Search:</span>
                        <input type="text" id="searchInput" placeholder="e.g. Zapdos, Celebi" class="border-2 border-black p-1 font-bold text-sm bg-white text-blue-800 focus:outline-none focus:bg-blue-50 placeholder:text-gray-400 placeholder:font-normal w-full sm:w-48" oninput="renderTieringMatrix()">
                    </div>

                    <div class="w-[2px] h-6 bg-gray-300 hidden sm:block"></div>
                    
                    <div class="flex items-center gap-2 shrink-0">
                        <span class="text-[10px] font-black uppercase text-gray-500 tracking-wider">Base ELO:</span>
                        <select id="ratingSelect" class="border-2 border-black p-1 font-bold text-sm bg-white text-blue-800 focus:outline-none focus:bg-blue-50 cursor-pointer" onchange="renderTieringMatrix()">
                            <option value="1630">1630 (Standard)</option>
                            <option value="1500">1500 (Low Ladder)</option>
                            <option value="1760">1760 (Top Ladder)</option>
                            <option value="0">0 (All)</option>
                        </select>
                    </div>
                    
                    <div class="flex items-center gap-3 shrink-0">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black uppercase text-gray-500 tracking-wider">Start:</span>
                            <select id="startMonthSelect" class="border-2 border-black p-1 font-bold text-sm bg-white text-blue-800 focus:outline-none focus:bg-blue-50 cursor-pointer" onchange="renderTieringMatrix()"></select>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black uppercase text-gray-500 tracking-wider">End:</span>
                            <select id="endMonthSelect" class="border-2 border-black p-1 font-bold text-sm bg-white text-blue-800 focus:outline-none focus:bg-blue-50 cursor-pointer" onchange="renderTieringMatrix()"></select>
                        </div>
                    </div>

                </div>
        </div>

        <div class="flex-grow retro-box bg-white overflow-auto relative min-h-0" id="tieringMatrixContainer">
            <div class="flex items-center justify-center h-full text-gray-400 font-bold uppercase tracking-widest">Load Database to View Matrix</div>
        </div>
    </div>
	
	<div id="deepDiveModal" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center p-4 md:p-10 backdrop-blur-sm">
        <div class="retro-box w-full max-w-5xl bg-white flex flex-col h-full max-h-[800px] shadow-2xl">
            
            <div class="flex items-center justify-between bg-gray-200 border-b-2 border-black p-4">
                <div class="flex items-center gap-4">
                    <img id="modalSprite" src="" class="h-[40px] w-auto object-contain" alt="">
                    <div>
                        <h3 id="modalTitle" class="text-xl font-black uppercase tracking-widest text-black leading-none"></h3>
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1 block">Historical Usage Curve</span>
                    </div>
                    <span id="modalTier" class="text-sm font-bold px-3 py-1 bg-black text-white ml-2 border-2 border-white shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></span>
                </div>
                <button onclick="closeDeepDive()" class="retro-btn px-4 py-2 font-black text-sm uppercase bg-red-500 text-white hover:bg-red-600 transition-colors">Close [X]</button>
            </div>
            
            <div class="p-6 flex-grow relative w-full h-full bg-gray-50">
                <canvas id="deepDiveChart"></canvas>
            </div>
        </div>
    </div>

    <script>

        let availableDates = [];

            "espeon": "UUBL", "exeggutor": "UUBL", "gardevoir": "UUBL", "hariyama": "UUBL", "houndoom": "UUBL",
            "jynx": "UUBL", "kadabra": "UUBL", "kingdra": "UUBL", "linoone": "UUBL", "machamp": "UUBL",
            "marowak": "UUBL", "miltank": "UUBL", "regirock": "UUBL", "registeel": "UUBL", "rhydon": "UUBL",

            "vaporeon": "UUBL", "venusaur": "UUBL", "weezing": "UUBL", "zangoose": "UUBL",
            // UU
            "absol": "UU", "aggron": "UU", "ampharos": "UU", "arcanine": "UU", "camerupt": "UU", "clefable": "UU",
            "cradily": "UU", "electrode": "UU", "exploud": "UU", "feraligatr": "UU", "gligar": "UU", "golduck": "UU",
            "golem": "UU", "gorebyss": "UU", "granbull": "UU", "grumpig": "UU", "hitmonlee": "UU", "hitmontop": "UU",
            "hypno": "UU", "jumpluff": "UU", "kabutops": "UU", "kangaskhan": "UU", "lanturn": "UU", "lapras": "UU",
            "lunatone": "UU", "mantine": "UU", "misdreavus": "UU", "muk": "UU", "nidoking": "UU", "nidoqueen": "UU",
            "omastar": "UU", "pinsir": "UU", "poliwrath": "UU", "quagsire": "UU", "qwilfish": "UU", "rapidash": "UU",
            "sandslash": "UU", "scyther": "UU", "sharpedo": "UU", "shiftry": "UU", "solrock": "UU", "tentacruel": "UU",
            "victreebel": "UU", "vileplume": "UU", "walrein": "UU", "xatu": "UU",
            // RUBL / RU
            "altaria": "RU", "azumarill": "RU", "banette": "RU", "crawdaunt": "RU", "electabuzz": "RU", "fearow": "RUBL",
            "glalie": "RU", "gloom": "RU", "hitmonchan": "RU", "huntail": "RU", "magmar": "RU", "meganium": "RU",
            "mr-mime": "RU", "ninjask": "RUBL", "persian": "RU", "pidgeot": "RU", "politoed": "RU", "primeape": "RU",
            "relicanth": "RU", "sableye": "RU", "stantler": "RU", "sudowoodo": "RU", "venomoth": "RU", "whiscash": "RU",
            // NUBL / NU
            "arbok": "NU", "bellossom": "NU", "butterfree": "NU", "cacturne": "NU", "castform": "NU", "chimecho": "NU",
            "corsola": "NU", "dewgong": "NU", "flareon": "NU", "golbat": "NU", "haunter": "NU", "kecleon": "NU",
            "kingler": "NU", "machoke": "NU", "magcargo": "NU", "metang": "NU", "mightyena": "NU", "minun": "NU",
            "murkrow": "NU", "noctowl": "NU", "octillery": "NU", "pelipper": "NU", "pidgeotto": "NU", "pikachu": "NU",
            "piloswine": "NU", "plusle": "NU", "pupitar": "NU", "raticate": "NU", "roselia": "NU", "seaking": "NU",
            "tangela": "NU", "torkoal": "NU", "tropius": "NU", "vigoroth": "NU", "wailord": "NU"
        };

        window.onload = () => {
            const container = document.getElementById('tieringMatrixContainer');
            container.innerHTML = '<div class="loader m-10"></div><div class="text-xs font-bold text-gray-500 mt-2">Fetching adv_ou_db.json...</div>';

            fetch('adv_ou_db.json')
                .then(response => {
                    if (!response.ok) throw new Error("HTTP error " + response.status);
                    return response.json();
                })
                .then(data => {
                    GLOBAL_DB = data;
                    availableDates = Object.keys(GLOBAL_DB.history).sort();
                    
                    if (availableDates.length > 0) {
						const startSelect = document.getElementById('startMonthSelect');
                        const endSelect = document.getElementById('endMonthSelect');
                        availableDates.forEach(date => {
                            startSelect.add(new Option(date, date));
                            endSelect.add(new Option(date, date));
                        });
						
						startSelect.value = availableDates[0];
                        endSelect.value = availableDates[availableDates.length - 1];
						
                        const latest = availableDates[availableDates.length - 1];
                        const availableRatings = Object.keys(GLOBAL_DB.history[latest]);
                        const preferred = ['1630', '1695', '1760', '1500', '0'].find(r => availableRatings.includes(r));
                        if(preferred) document.getElementById('ratingSelect').value = preferred;
                    }
                    
                    renderTieringMatrix();
                })
                .catch(err => {
                    console.error("Failed to load JSON:", err);
                    container.innerHTML = `<div class="text-red-600 font-bold p-4 border-2 border-red-600 bg-red-50">Error loading adv_ou_db.json. Ensure it is uploaded to the same directory.</div>`;
                });
        };

        function renderTieringMatrix() {
            if (!GLOBAL_DB) return;
            const container = document.getElementById('tieringMatrixContainer');
            const rating = document.getElementById('ratingSelect').value;
            
            const eloTag = document.getElementById('tieringEloTag');
            if (eloTag) {
                eloTag.innerText = `[${rating === '0' ? 'ALL' : rating}]`;
            }

			container.innerHTML = '<div class="loader m-10"></div>'; 

            if (window.renderTimer) clearTimeout(window.renderTimer);

            window.renderTimer = setTimeout(() => {
                const startMonth = document.getElementById('startMonthSelect').value;
                const endMonth = document.getElementById('endMonthSelect').value;
                let filteredDates = availableDates.filter(d => d >= startMonth && d <= endMonth);
                if (filteredDates.length === 0) filteredDates = availableDates;

                const searchInput = document.getElementById('searchInput');
                const searchTerms = searchInput ? searchInput.value.toLowerCase().split(',').map(s => s.trim()).filter(s => s.length > 0) : [];

                const allMons = new Set();
                availableDates.forEach(date => {
                    if (GLOBAL_DB.history[date][rating]?.usage) {
                        GLOBAL_DB.history[date][rating].usage.forEach(u => allMons.add(u.name));
                    }
                });
                
                const targetDate = filteredDates[filteredDates.length - 1];
                const targetIdx = availableDates.indexOf(targetDate);
                const weightedMap = {};

                allMons.forEach(mon => {
                    const getU = (idx) => {
                        if (idx < 0) return 0;
                        const d = availableDates[idx];
                        if (!d || !GLOBAL_DB.history[d][rating]?.usage) return 0;
                        const rec = GLOBAL_DB.history[d][rating].usage.find(x => x.name === mon);
                        return rec ? rec.usage : 0;
                    };
                    const u0 = getU(targetIdx);
                    const u1 = getU(targetIdx - 1);
                    const u2 = getU(targetIdx - 2);
                    weightedMap[mon] = ((20 * u0) + (3 * u1) + (1 * u2)) / 24;
                });

                const sortedMons = Array.from(allMons).sort((a, b) => {
                    const weightA = weightedMap[a] || 0;
                    const weightB = weightedMap[b] || 0;
                    if (weightA !== weightB) return weightB - weightA;
                    return a.localeCompare(b);
                });

                const displayMons = sortedMons.filter(mon => {
                    if (searchTerms.length === 0) return true;
                    const monLower = mon.toLowerCase();
                    return searchTerms.some(term => monLower.includes(term));
                });

                let html = '<table class="border-collapse w-full">';
                
				html += '<thead><tr><th class="sticky-corner p-2 border border-white z-50 whitespace-nowrap min-w-[160px]">MON / DATE</th>';   
				
                filteredDates.forEach(date => {
                    html += `<th class="sticky-row p-1 border-r border-black font-mono text-xs whitespace-nowrap">${date}</th>`;
                });
                html += '</tr></thead><tbody>';

                displayMons.forEach(mon => {
                    let peakUsage = 0;
                    let peakDate = "N/A";
					
					filteredDates.forEach((date) => {
                        const actualIdx = availableDates.indexOf(date);
                        
                        const getU = (i) => {
                            if (i < 0) return 0;
                            const d = availableDates[i];
                            if (!d || !GLOBAL_DB.history[d][rating]?.usage) return 0;
                            const rec = GLOBAL_DB.history[d][rating].usage.find(x => x.name === mon);
                            return rec ? rec.usage : 0;
                        };
                        
                        const weighted = ((20 * getU(actualIdx)) + (3 * getU(actualIdx-1)) + (1 * getU(actualIdx-2))) / 24;
                        if (weighted > peakUsage) {
                            peakUsage = weighted;
                            peakDate = date;
                        }
                    });
                    
                    const currentTier = CURRENT_ADV_TIERS[mon.toLowerCase()] || "Below NU";

					html += `<tr>
						<td class="sticky-col p-0 bg-white border-r-2 border-black align-middle hover:z-50 min-w-[160px]">
						
							<div class="relative group w-full h-full flex items-center z-40 hover:z-50 cursor-pointer hover:bg-gray-100 transition-colors" onclick="openDeepDive('${mon}')">
                                
                                <div class="px-2 py-1 flex items-center gap-2 font-bold text-sm whitespace-nowrap">				
                                    <img src="${getIconUrl(mon)}" class="h-[30px] w-auto flex-none object-contain" alt="${mon}">
                                    <span>${mon}</span>
                                </div>
                                
                                <div class="absolute left-[100%] top-0 ml-2 hidden group-hover:flex flex-col bg-black text-white text-xs p-3 border-2 border-gray-600 shadow-xl z-50 whitespace-nowrap pointer-events-none">
                                    <span class="font-black text-blue-400 uppercase tracking-widest border-b border-gray-600 mb-1 pb-1">Current Tier: ${currentTier}</span>
                                    <span class="text-gray-300 font-mono mt-1">Peak: <span class="text-white font-bold">${peakUsage.toFixed(2)}%</span> <span class="text-gray-500">(${peakDate})</span></span>
                                </div>
                                
                            </div>
							
                        </td>`;

                    filteredDates.forEach((date) => {
                        const actualIdx = availableDates.indexOf(date);

                        const getU = (idx) => {
                            if (idx < 0) return 0;
                            const d = availableDates[idx];
                            if (!d || !GLOBAL_DB.history[d][rating]?.usage) return 0;
                            const rec = GLOBAL_DB.history[d][rating].usage.find(x => x.name === mon);
                            return rec ? rec.usage : 0;
                        };

                        const u0 = getU(actualIdx);
                        const u1 = getU(actualIdx - 1);
                        const u2 = getU(actualIdx - 2);
                        const weighted = ((20 * u0) + (3 * u1) + (1 * u2)) / 24;
                        
                        const isOU = weighted >= 3.41;
                        let cellClass = isOU ? 'bg-green-100 text-green-900' : 'bg-gray-100 text-gray-400';
                        
                        let borderStyle = 'border-r border-b border-gray-300';
                        
                        let wasOU = false;
                        if (actualIdx > 0) {
                            const pu0 = getU(actualIdx - 1);
                            const pu1 = getU(actualIdx - 2);
                            const pu2 = getU(actualIdx - 3);
                            const pWeighted = ((20 * pu0) + (3 * pu1) + (1 * pu2)) / 24;
                            wasOU = pWeighted >= 3.41;
                            
                            if (isOU && !wasOU) borderStyle = 'border-2 border-green-600 z-10 relative'; 
                            if (!isOU && wasOU) borderStyle = 'border-2 border-red-600 z-10 relative'; 
                        }

                        html += `<td class="matrix-cell ${cellClass} ${borderStyle}" title="${date}: ${weighted.toFixed(2)}%">${weighted.toFixed(1)}%</td>`;
                    });
                    html += '</tr>';
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            }, 10);
        }
        
        let deepDiveChartInstance = null;

        function openDeepDive(mon) {
            const modal = document.getElementById('deepDiveModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            document.getElementById('modalSprite').src = getIconUrl(mon);
            document.getElementById('modalTitle').innerText = mon;
            document.getElementById('modalTier').innerText = CURRENT_ADV_TIERS[mon.toLowerCase()] || "Below NU";
            
            const startMonth = document.getElementById('startMonthSelect').value;
            const endMonth = document.getElementById('endMonthSelect').value;
            const rating = document.getElementById('ratingSelect').value;
            
            let filteredDates = availableDates.filter(d => d >= startMonth && d <= endMonth);
            if (filteredDates.length === 0) filteredDates = availableDates;
            
            const chartData = [];
            const cutoffData = [];
            
            filteredDates.forEach(date => {
                const actualIdx = availableDates.indexOf(date);
                const getU = (idx) => {
                    if (idx < 0) return 0;
                    const d = availableDates[idx];
                    if (!d || !GLOBAL_DB.history[d][rating]?.usage) return 0;
                    const rec = GLOBAL_DB.history[d][rating].usage.find(x => x.name === mon);
                    return rec ? rec.usage : 0;
                };
                
                const weighted = ((20 * getU(actualIdx)) + (3 * getU(actualIdx-1)) + (1 * getU(actualIdx-2))) / 24;
                chartData.push(weighted.toFixed(2));
                
                cutoffData.push(3.41);
            });
            
            const ctx = document.getElementById('deepDiveChart').getContext('2d');
            
            if (deepDiveChartInstance) deepDiveChartInstance.destroy();
            
            Chart.defaults.font.family = "'Courier New', Courier, monospace";
            Chart.defaults.font.weight = 'bold';
            Chart.defaults.color = '#374151';

            deepDiveChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filteredDates,
                    datasets: [
                        {
                            label: 'Weighted Usage %',
                            data: chartData,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#2563eb',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 7,
                            fill: true,
                            tension: 0.2
                        },
                        {
                            label: 'OU Cutoff (3.41%)',
                            data: cutoffData,
                            borderColor: '#ef4444',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            pointHoverRadius: 0,
                            fill: false,
                            tension: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.9)',
                            titleFont: { size: 14 },
                            bodyFont: { size: 14, weight: 'bold' },
                            padding: 12,
                            cornerRadius: 0,
                            callbacks: {
                                label: function(context) { return context.dataset.label + ': ' + context.parsed.y + '%'; }
                            }
                        },
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#e5e7eb' },
                            ticks: { callback: function(value) { return value + '%'; } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 12 }
                        }
                    }
                }
            });
        }

        function closeDeepDive() {
            const modal = document.getElementById('deepDiveModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
		
        function formatNameForPokesprite(name) { 
            return name.toLowerCase().replace(/[^a-z0-9]/g, ''); 
        }
        
        function getIconUrl(name) {
